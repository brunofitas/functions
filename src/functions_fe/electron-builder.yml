# electron-builder — package the desktop app per OS, bundling the frozen orchestrator
# (PyInstaller) so the app ships with Python + all deps. Version is injected in CI from
# GitVersion via -c.extraMetadata.version.
appId: com.brunofitas.functions
productName: functions
directories:
  output: ../../dist-app
files:
  - electron/**/*
  - index.html
  - dist/**/*
extraResources:
  - from: ../../dist/functions-orchestrator   # PyInstaller onedir output
    to: orchestrator
  - from: ../../examples
    to: examples
  - from: index.html
    to: gui/index.html
  - from: dist
    to: gui/dist
mac:
  target: [dmg, zip]
  category: public.app-category.developer-tools
win:
  target: [nsis]
linux:
  target: [AppImage]
publish:
  provider: github
  owner: brunofitas
  repo: functions
