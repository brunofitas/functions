<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>functions — Studio</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
         background: #0f1115; color: #e6e6e6; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  h2 { font-size: 12px; color: #9aa4b2; text-transform: uppercase; letter-spacing: .5px; margin: 0 0 10px; }
  h3 { font-size: 15px; margin: 0 0 14px; }

  /* top bar */
  .topbar { display: flex; align-items: center; padding: 0 16px; height: 48px; flex: none;
            border-bottom: 1px solid #222; background: #11141a; }
  .brand { font-weight: 600; cursor: pointer; }
  .topbar .icon-btn { margin-left: auto; background: transparent; color: #9aa4b2; font-size: 18px;
                      width: 34px; height: 34px; padding: 0; border-radius: 8px; }
  .topbar .icon-btn:hover { background: #1b2027; color: #e6e6e6; }
  .topbar .icon-btn.active { background: #4f7cff; color: #fff; }

  .content { flex: 1; min-height: 0; overflow: auto; padding: 20px; }

  /* main view */
  .layout { display: flex; gap: 20px; }
  .sidebar { width: 280px; flex: none; }
  .main { flex: 1; min-width: 0; }
  .fn-list .fn { padding: 6px 10px; border: 1px solid #222; border-radius: 6px; margin-bottom: 6px; background: #161a20; }
  .muted { color: #667; }
  button { padding: 9px 16px; border: 0; border-radius: 6px; background: #4f7cff; color: #fff;
           font: inherit; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .console { margin-top: 16px; }
  .status { color: #9aa4b2; margin-bottom: 10px; }
  .step { border: 1px solid #222; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .step-title { padding: 7px 12px; background: #161a20; font-weight: 600; }
  .step.running .step-title { color: #ffcf6b; } .step.done .step-title { color: #7fe3a0; }
  .step.error .step-title { color: #ff8b88; }
  pre { margin: 0; padding: 8px 12px; white-space: pre-wrap; color: #cfd6e4; }
  .outputs { padding: 6px 12px; color: #c89bff; border-top: 1px solid #222; }

  /* settings view */
  .settings-layout { display: flex; gap: 24px; }
  .settings-sidebar { width: 200px; flex: none; }
  .menu-item { padding: 8px 12px; border-radius: 6px; color: #cfd6e4; cursor: default; }
  .menu-item.active { background: #1b2027; color: #fff; }
  .settings-panel { flex: 1; min-width: 0; max-width: 640px; }
  .section-label { font-size: 11px; color: #9aa4b2; letter-spacing: .5px; margin-bottom: 8px; }
  .engine-options { display: flex; flex-direction: column; gap: 8px; }
  .engine-opt { display: flex; align-items: center; gap: 10px; padding: 12px 14px;
                border: 1px solid #222; border-radius: 8px; background: #161a20; cursor: pointer; }
  .engine-opt:has(input:checked) { border-color: #4f7cff; box-shadow: 0 0 0 1px #4f7cff55; }
  .saved-note { margin-top: 12px; color: #7fe3a0; min-height: 20px; }
</style>
</head>
<body>
  <div id="app"></div>
  <script>window.FUNCTIONS_TOKEN = "__TOKEN__";</script>
  <script src="/studio.js"></script>
</body>
</html>
