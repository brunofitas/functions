<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>functions — Studio</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
         background: #0f1115; color: #e6e6e6; }
  #app { padding: 20px; max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 17px; } h2 { font-size: 13px; color: #9aa4b2; text-transform: uppercase; letter-spacing: .5px; }
  .layout { display: flex; gap: 20px; }
  .sidebar { width: 280px; flex: none; }
  .main { flex: 1; min-width: 0; }
  .fn-list .fn { padding: 6px 10px; border: 1px solid #222; border-radius: 6px; margin-bottom: 6px; background: #161a20; }
  .muted { color: #667; }
  button { padding: 9px 16px; border: 0; border-radius: 6px; background: #4f7cff; color: #fff;
           font: inherit; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .console { margin-top: 16px; }
  .status { color: #9aa4b2; margin-bottom: 10px; }
  .step { border: 1px solid #222; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .step-title { padding: 7px 12px; background: #161a20; font-weight: 600; }
  .step.running .step-title { color: #ffcf6b; } .step.done .step-title { color: #7fe3a0; }
  .step.error .step-title { color: #ff8b88; }
  pre { margin: 0; padding: 8px 12px; white-space: pre-wrap; color: #cfd6e4; }
  .outputs { padding: 6px 12px; color: #c89bff; border-top: 1px solid #222; }
</style>
</head>
<body>
  <div id="app"></div>
  <script>window.FUNCTIONS_TOKEN = "__TOKEN__";</script>
  <script src="/studio.js"></script>
</body>
</html>
