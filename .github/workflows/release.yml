name: release

# infra_003 — cross-platform installers via GitHub Releases. Tag a version (vX.Y.Z) to
# build wheels + the frontend bundle on each OS and attach them to the Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build Python wheels
        run: |
          python -m pip install -U pip build
          python -m build -o dist src/functions_shared
          python -m build -o dist src/functions_be
        shell: bash
      - name: Build frontend
        run: cd src/functions_fe && npm install && npm run build
        shell: bash
      - name: Package artifacts
        run: |
          mkdir -p out
          cp dist/*.whl out/ 2>/dev/null || true
          tar -czf "out/functions-${{ matrix.os }}.tar.gz" dist src/functions_fe/dist infra README.md LICENSE
        shell: bash
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
