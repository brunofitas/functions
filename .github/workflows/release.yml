name: release

# On merge to main: GitVersion computes the SemVer (start 0.0.1, default patch bump),
# tag it, then build self-contained desktop apps for macOS/Linux/Windows (Electron +
# bundled PyInstaller orchestrator) and publish a GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gv.outputs.majorMinorPatch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"
      - id: gv
        uses: gittools/actions/gitversion/execute@v3
      - name: Tag v${{ steps.gv.outputs.majorMinorPatch }}
        env:
          TAG: v${{ steps.gv.outputs.majorMinorPatch }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists — skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Freeze orchestrator (PyInstaller) — bundles Python + all deps
        shell: bash
        run: |
          python -m pip install -U pip pyinstaller
          pip install ./src/functions_shared ./src/functions_be
          pyinstaller --noconfirm --clean --onedir --name functions-orchestrator \
            --collect-all uvicorn --collect-all functions_be --collect-all functions_shared \
            infra/packaging/orchestrator_entry.py

      - name: Build Studio bundle
        shell: bash
        run: cd src/functions_fe && npm install && npm run build

      - name: Package + publish (electron-builder)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src/functions_fe
          npx --yes electron-builder --publish always \
            -c.extraMetadata.version=${{ needs.version.outputs.semver }}
