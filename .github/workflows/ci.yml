name: ci

on:
  push:
  pull_request:

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install modules
        run: |
          python -m pip install -U pip
          pip install -e "src/functions_shared[dev]"
          pip install -e "src/functions_be[dev]"
      - name: Lint
        run: ruff check src/functions_shared src/functions_be
      - name: Test + coverage gate (>=85%)
        run: pytest        # pytest.ini enforces --cov-fail-under=85

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd src/functions_fe && npm install
      - name: Typecheck
        run: cd src/functions_fe && npm run typecheck
      - name: Test + coverage gate (>=85%)
        run: cd src/functions_fe && npm test   # vitest run --coverage (>=85% thresholds)
