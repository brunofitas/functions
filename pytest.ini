[pytest]
# Shared config for both Python modules (run from the root, shared .venv).
# Coverage gate: every module must stay at or above 85%.
testpaths =
    src/functions_shared/tests
    src/functions_be/tests
asyncio_mode = auto
addopts =
    --cov=functions_shared
    --cov=functions_be
    --cov-report=term-missing
    --cov-fail-under=85
